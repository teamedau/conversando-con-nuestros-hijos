<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo -->
  <rect width="64" height="64" rx="14" fill="#0a0a1a"/>

  <!-- Burbuja grande (padre) -->
  <rect x="8" y="10" width="36" height="24" rx="8" fill="#4272FF"/>
  <polygon points="16,34 10,42 24,34" fill="#4272FF"/>

  <!-- Burbuja chica (hijo) -->
  <rect x="22" y="30" width="34" height="20" rx="7" fill="#42EAFF"/>
  <polygon points="28,50 22,56 36,50" fill="#42EAFF"/>

  <!-- Puntos burbuja padre -->
  <circle cx="19" cy="22" r="3" fill="white"/>
  <circle cx="26" cy="22" r="3" fill="white"/>
  <circle cx="33" cy="22" r="3" fill="white"/>

  <!-- Puntos burbuja hijo -->
  <circle cx="32" cy="40" r="2.5" fill="#0a0a1a"/>
  <circle cx="39" cy="40" r="2.5" fill="#0a0a1a"/>
  <circle cx="46" cy="40" r="2.5" fill="#0a0a1a"/>
</svg>
