<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Rum+Raisin&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Círculos decorativos */
    .circle-1 {
      position: absolute;
      top: -80px; left: -80px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: #4272FF;
      opacity: 0.15;
      filter: blur(80px);
    }
    .circle-2 {
      position: absolute;
      bottom: -60px; right: -60px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: #42EAFF;
      opacity: 0.12;
      filter: blur(70px);
    }
    .circle-3 {
      position: absolute;
      top: 50%; right: 200px;
      width: 250px; height: 250px;
      border-radius: 50%;
      background: #FF7E42;
      opacity: 0.10;
      filter: blur(80px);
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 90px;
      gap: 60px;
    }

    .left {
      flex: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 8px 20px;
      color: rgba(255,255,255,0.75);
      font-size: 16px;
      margin-bottom: 28px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #42EAFF;
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Rum Raisin', cursive;
      font-size: 72px;
      line-height: 1.1;
      color: white;
      margin-bottom: 24px;
    }

    h1 span {
      color: #42EAFF;
    }

    .subtitle {
      font-size: 20px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      max-width: 480px;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .stat {
      border-radius: 16px;
      padding: 20px 32px;
      text-align: center;
      min-width: 200px;
    }

    .stat-number {
      font-family: 'Rum Raisin', cursive;
      font-size: 48px;
      line-height: 1;
      color: #0a0a1a;
    }

    .stat-label {
      font-size: 15px;
      font-weight: 500;
      color: #0a0a1a;
      margin-top: 4px;
    }

    .price {
      margin-top: 8px;
      border-radius: 16px;
      padding: 20px 32px;
      background: #FFB343;
      text-align: center;
    }

    .price-amount {
      font-family: 'Rum Raisin', cursive;
      font-size: 40px;
      color: #0a0a1a;
    }

    .price-label {
      font-size: 14px;
      font-weight: 500;
      color: rgba(10,10,26,0.7);
    }
  </style>
</head>
<body>
  <div class="circle-1"></div>
  <div class="circle-2"></div>
  <div class="circle-3"></div>

  <div class="content">
    <div class="left">
      <div class="badge">
        <div class="dot"></div>
        23 de Mayo · 10 am – 1 pm · Bardon, Brisbane
      </div>
      <h1>
        Conversando con<br>
        <span>nuestros hijos</span>
      </h1>
      <p class="subtitle">
        6 expertas en vivo · 3 horas de contenido real<br>
        Un evento presencial para familias latinas en Brisbane
      </p>
    </div>

    <div class="right">
      <div class="stat" style="background: #FFB343;">
        <div class="stat-number">6</div>
        <div class="stat-label">expertas en vivo</div>
      </div>
      <div class="stat" style="background: #42EAFF;">
        <div class="stat-number">3h</div>
        <div class="stat-label">de contenido real</div>
      </div>
      <div class="price">
        <div class="price-amount">$40 AUD</div>
        <div class="price-label">entrada general</div>
      </div>
    </div>
  </div>
</body>
</html>
